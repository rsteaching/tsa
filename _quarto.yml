project:
  type: website
  output-dir: docs

website:
  title: "Econometrics"
  navbar:
    pinned: true
    left:
      - text: "Topic 1"
        href: Topic1.html
      - text: "Topic 2"
        href: Topic2.html
    right:
      - text: "<span class='navbar-brand-name'>Dr Ragvir Sabharwal</span><span class='navbar-brand-institution'>Imperial Business School</span>"
        href: https://profiles.imperial.ac.uk/r.sabharwal23
  page-footer:
    center: "Copyright © 2026 Ragvir Sabharwal. All rights reserved."


format:
  html:
    theme: [default, ember.scss]
    toc: true
    toc-location: left
    toc-depth: 2
    number-sections: true
    number-depth: 2
    smooth-scroll: true
    anchor-sections: true
    toc-expand: true
    highlight-style: arrow-dark
    grid:
      body-width: 860px
      margin-width: 180px
      gutter-width: 1.5rem
    include-after-body:
      text: |
        <script>
        document.querySelectorAll('div.audio').forEach(div => {
          const file = div.textContent.trim();
          div.innerHTML = '<p>' + (div.dataset.label || 'Listen') + '</p>'
                        + '<audio controls src="' + file + '"></audio>';
          div.addEventListener('click', e => {
            if (e.target.tagName !== 'AUDIO') div.classList.toggle('open');
          });
        });
        </script>
  pdf:
    fig-pos: 'H'
    include-in-header:
      text: |
        \usepackage{float}
        \usepackage{placeins}
        \raggedbottom

engine: knitr

filters:
  - shinylive

editor: source
