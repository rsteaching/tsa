project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - Topic1.qmd
    - Topic2.qmd
    - Topic3.qmd
    - Topic4.qmd
    - Topic5.qmd
    - Topic6.qmd
    - Topic7.qmd
    - Topic8.qmd
    - Topic9.qmd
    - about.qmd

website:
  title: "Econometrics"
  navbar:
    pinned: true
    left:
      - text: "Topic 1"
        href: Topic1.html
      - text: "Topic 2"
        href: Topic2.html
      - text: "Topic 3"
        href: Topic3.html
      - text: "Topic 4"
        href: Topic4.html
      - text: "Topic 5"
        href: Topic5.html
      - text: "Topic 6"
        href: Topic6.html
      - text: "Topic 7"
        href: Topic7.html
      - text: "Topic 8"
        href: Topic8.html
      - text: "Topic 9"
        href: Topic9.html
    right:
      - text: "Dr Ragvir Sabharwal"
  page-footer:
    center: "Copyright © 2026 Ragvir Sabharwal. All rights reserved."

bibliography: references.bib

format:
  html:
    theme: [default, ember.scss]
    toc: true
    toc-location: left
    toc-depth: 2
    number-sections: true
    number-depth: 2
    smooth-scroll: true
    anchor-sections: true
    toc-expand: true
    highlight-style: arrow-dark
    grid:
      body-width: 860px
      margin-width: 180px
      gutter-width: 1.5rem
    include-after-body:
      text: |
        <script>
        document.querySelectorAll('div.audio').forEach(div => {
          const file = div.textContent.trim();
          div.innerHTML = '<p>' + (div.dataset.label || 'Listen') + '</p>'
                        + '<audio controls src="' + file + '"></audio>';
          div.addEventListener('click', e => {
            if (e.target.tagName !== 'AUDIO') div.classList.toggle('open');
          });
        });
        </script>

  pdf:
    pdf-engine: lualatex
    number-sections: true
    number-depth: 2
    include-in-header:
      - pdf-theme.tex
      - slidebox.tex

engine: knitr

filters:
  - shinylive
  - slidebox.lua

editor: source
